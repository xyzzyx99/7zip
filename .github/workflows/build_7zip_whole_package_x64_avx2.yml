name: Build 7-Zip Whole Package x64 AVX2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-x64:
    name: Windows x64 MSVC AVX2
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Patch 7-Zip makefile for maximum optimization and AVX2
        shell: pwsh
        run: |
          $buildMak = "CPP\Build.mak"
          if (!(Test-Path $buildMak)) {
            throw "Cannot find $buildMak"
          }

          $text = Get-Content $buildMak -Raw

          # 7-Zip uses both CFLAGS_O1 and CFLAGS_O2.
          # Patch both, otherwise files compiled through CFLAGS_O1 would still use -O1.
          $optFlags = '$(CFLAGS) -O2 -Ob3 -Oi -Ot -Oy -GL -Gy -GF -Gw -arch:AVX2'
          $text = $text -replace 'CFLAGS_O1\s*=\s*\$\(CFLAGS\)\s+-O1', "CFLAGS_O1 = $optFlags"
          $text = $text -replace 'CFLAGS_O2\s*=\s*\$\(CFLAGS\)\s+-O2', "CFLAGS_O2 = $optFlags"

          # Add link-time optimization. /OPT:REF and /OPT:ICF are already present
          # in Build.mak, but keeping them here makes the intended settings explicit.
          $text += "`r`n# Added by GitHub Actions workflow: maximum optimization + AVX2`r`n"
          $text += 'LFLAGS = $(LFLAGS) /LTCG /OPT:REF /OPT:ICF' + "`r`n"

          Set-Content -Path $buildMak -Value $text -NoNewline

          Write-Host "Effective optimization-related lines:"
          Select-String -Path $buildMak -Pattern 'CFLAGS_O1|CFLAGS_O2|LFLAGS = \$\(LFLAGS\).*LTCG|arch:AVX2' | ForEach-Object {
            Write-Host $_.Line
          }

      - name: Build whole 7-Zip package
        shell: cmd
        working-directory: CPP\7zip
        run: |
          nmake PLATFORM=x64

      # Explicitly build the all-formats DLL target. This should normally be included
      # by the top-level bundle build, but this step guarantees 7z.dll is produced.
      - name: Build 7z.dll explicitly
        shell: cmd
        working-directory: CPP\7zip\Bundles\Format7zF
        run: |
          nmake PLATFORM=x64

      - name: Verify expected package outputs
        shell: pwsh
        run: |
          $required = @(
            "7z.exe",
            "7z.dll",
            "7zFM.exe",
            "7zG.exe",
            "7zz.exe",
            "7za.exe"
          )

          foreach ($name in $required) {
            $matches = Get-ChildItem -Path "CPP\7zip" -Recurse -File -Filter $name
            if (-not $matches) {
              throw "Required output was not built: $name"
            }
            Write-Host "Found ${name}:"
            $matches | ForEach-Object { Write-Host "  $($_.FullName)" }
          }

      - name: Stage package files
        shell: pwsh
        run: |
          $stage = "artifacts\7zip-windows-x64-avx2"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $patterns = @("*.exe", "*.dll", "*.sfx")
          $files = foreach ($pattern in $patterns) {
            Get-ChildItem -Path "CPP\7zip" -Recurse -File -Filter $pattern
          }

          $files = $files | Sort-Object FullName -Unique

          if (-not $files) {
            throw "No package binaries were found."
          }

          foreach ($file in $files) {
            Copy-Item -Path $file.FullName -Destination (Join-Path $stage $file.Name) -Force
          }

          Write-Host "Staged files:"
          Get-ChildItem $stage | Sort-Object Name | ForEach-Object {
            Write-Host "  $($_.Name)"
          }

      - name: Create zip package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "artifacts\7zip-windows-x64-avx2\*" `
            -DestinationPath "artifacts\7zip-windows-x64-avx2.zip" `
            -Force

      - name: Upload package folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7zip-windows-x64-avx2-package-folder
          path: artifacts/7zip-windows-x64-avx2/
          if-no-files-found: error

      - name: Upload zip package artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7zip-windows-x64-avx2-package-zip
          path: artifacts/7zip-windows-x64-avx2.zip
          if-no-files-found: error
