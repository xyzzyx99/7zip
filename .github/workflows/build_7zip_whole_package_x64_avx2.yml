name: Build 7-Zip whole package x64 AVX2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-x64:
    name: Windows x64 MSVC package AVX2
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Force maximum optimization and AVX2
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $buildMak = Join-Path $env:GITHUB_WORKSPACE 'CPP\Build.mak'
          if (-not (Test-Path $buildMak)) {
            throw "Cannot find $buildMak"
          }

          $text = Get-Content -LiteralPath $buildMak -Raw

          # 7-Zip's Build.mak normally defines:
          #   CFLAGS_O1 = $(CFLAGS) -O1
          #   CFLAGS_O2 = $(CFLAGS) -O2
          # Replace both so every O1/O2 compile path uses the same aggressive x64 AVX2 settings.
          $maxClFlags = '-O2 -Ob3 -Oi -Ot -Oy -GL -Gy -GF -Gw -arch:AVX2'
          $text = [regex]::Replace($text, '(?m)^CFLAGS_O1\s*=.*$', 'CFLAGS_O1 = $(CFLAGS) ' + $maxClFlags)
          $text = [regex]::Replace($text, '(?m)^CFLAGS_O2\s*=.*$', 'CFLAGS_O2 = $(CFLAGS) ' + $maxClFlags)

          # Enable link-time code generation to match /GL.
          $text = [regex]::Replace(
            $text,
            '(?m)^(LFLAGS\s*=\s*\$\(LFLAGS\)\s+-nologo\s+-OPT:REF\s+-OPT:ICF\s+-INCREMENTAL:NO)\s*$',
            '$1 -LTCG'
          )

          Set-Content -LiteralPath $buildMak -Value $text -NoNewline

          Write-Host 'Effective optimization lines in CPP\Build.mak:'
          Select-String -LiteralPath $buildMak -Pattern 'CFLAGS_O1|CFLAGS_O2|LFLAGS = \$\(LFLAGS\) -nologo' | ForEach-Object {
            Write-Host $_.Line
          }

      - name: Build whole 7-Zip package
        shell: cmd
        working-directory: CPP\7zip
        run: |
          nmake PLATFORM=x64

      - name: Show produced binaries
        shell: pwsh
        run: |
          Get-ChildItem -Path "CPP\7zip" -Recurse -File -Include *.exe,*.dll,*.sfx |
            Sort-Object FullName |
            ForEach-Object { $_.FullName }

      - name: Stage package files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $root = Join-Path $env:GITHUB_WORKSPACE 'CPP\7zip'
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist\7zip-windows-x64-avx2'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          # Preserve relative paths so duplicate names from different build targets do not overwrite each other.
          $files = Get-ChildItem -Path $root -Recurse -File -Include *.exe,*.dll,*.sfx |
            Sort-Object FullName

          if (-not $files) {
            throw 'No package binaries were produced.'
          }

          foreach ($file in $files) {
            $relative = $file.FullName.Substring($root.Length).TrimStart('\')
            $target = Join-Path $dist $relative
            New-Item -ItemType Directory -Force -Path (Split-Path $target -Parent) | Out-Null
            Copy-Item -LiteralPath $file.FullName -Destination $target -Force
          }

          # Include license/readme files when present.
          $docFiles = @(
            'DOC\readme.txt',
            'DOC\License.txt',
            'DOC\copying.txt',
            'DOC\unRarLicense.txt',
            'DOC\src-history.txt'
          )

          foreach ($doc in $docFiles) {
            $source = Join-Path $env:GITHUB_WORKSPACE $doc
            if (Test-Path $source) {
              $target = Join-Path $dist $doc
              New-Item -ItemType Directory -Force -Path (Split-Path $target -Parent) | Out-Null
              Copy-Item -LiteralPath $source -Destination $target -Force
            }
          }

      - name: Create package zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist\7zip-windows-x64-avx2'
          $zip = Join-Path $env:GITHUB_WORKSPACE 'dist\7zip-windows-x64-avx2.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$dist\*" -DestinationPath $zip -Force

      - name: Upload package folder
        uses: actions/upload-artifact@v4
        with:
          name: 7zip-windows-x64-avx2-package-folder
          path: dist/7zip-windows-x64-avx2/
          if-no-files-found: error

      - name: Upload package zip
        uses: actions/upload-artifact@v4
        with:
          name: 7zip-windows-x64-avx2-package-zip
          path: dist/7zip-windows-x64-avx2.zip
          if-no-files-found: error
